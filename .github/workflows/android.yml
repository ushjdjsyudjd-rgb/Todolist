name: Build Android Release APK (Cafe Bazaar)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find Project Root and Fix Gradle Wrapper
      run: |
        PROJECT_DIR=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | xargs dirname)
        echo "Project directory found at: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found, initializing gradle wrapper..."
          gradle wrapper
        fi
        
        chmod +x gradlew
        echo "PROJECT_PATH=$PROJECT_DIR" >> $GITHUB_ENV

    - name: Decode Keystore
      run: |
        cd "${{ env.PROJECT_PATH }}"
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > hamed_release_key.jks

    - name: Build Unsigned Release APK
      run: |
        cd "${{ env.PROJECT_PATH }}"
        # با این دستور به گریدل می‌گوییم کاری به امضا نداشته باشد و فقط فایل را آپتیمایز و بیلد کند
        ./gradlew assembleRelease -Pandroid.injected.signing.config.file=""

    - name: Sign APK using apksigner
      run: |
        cd "${{ env.PROJECT_PATH }}"
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
        
        # پیدا کردن فایل APK بیلد شده (چهunsigned باشد چه نباشد)
        UNSIGNED_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        echo "Found APK to sign: $UNSIGNED_APK"
        
        # امضای نهایی و دستی با کلید رسمی شما
        $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
          --ks hamed_release_key.jks \
          --ks-key-alias "${{ secrets.ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          $UNSIGNED_APK

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: "**/app/build/outputs/apk/release/app-release-signed.apk"
