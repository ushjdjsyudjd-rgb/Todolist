name: Build Android Release APK (Cafe Bazaar)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore and Inject Properties
      run: |
        # ۱. ساخت فایل‌های کلید مستقیماً در پوشه اصلی مخزن
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > my-upload-key.jks
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > hamed_release_key.jks
        
        # ۲. ساخت فایل تنظیمات رمزها برای گریدل در پوشه اصلی
        echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> local.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
        echo "keyAlias=${{ secrets.ALIAS }}" >> local.properties
        echo "storeFile=my-upload-key.jks" >> local.properties
        
        # ۳. انتقال یک نسخه به پوشه app در صورت وجود، بدون خطای کپی تکراری
        if [ -d "app" ]; then
          cp my-upload-key.jks app/my-upload-key.jks
          cp hamed_release_key.jks app/hamed_release_key.jks
          cp local.properties app/local.properties
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Sign APK (Extra Security)
      run: |
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" ! -name "*unsigned*" | head -n 1)
        
        $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
          --ks my-upload-key.jks \
          --ks-key-alias "${{ secrets.ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          $APK_PATH

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: "**/app/build/outputs/apk/release/app-release-signed.apk"
