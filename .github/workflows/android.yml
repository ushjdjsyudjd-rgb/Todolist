name: Build Android Release APK (Cafe Bazaar)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find Project Root and Fix Gradle Wrapper
      run: |
        PROJECT_DIR=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | xargs dirname)
        echo "Project directory found at: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found, initializing gradle wrapper..."
          gradle wrapper
        fi
        
        chmod +x gradlew
        echo "PROJECT_PATH=$PROJECT_DIR" >> $GITHUB_ENV

    - name: Decode Keystore in Every Possible Location
      run: |
        # ۱. ساخت فایل امضا در روت اصلی گیت‌هاب (دقیقاً جایی که گریدل در ارور به آن اشاره کرده)
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > my-upload-key.jks
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > hamed_release_key.jks
        
        # ۲. ساخت فایل در پوشه داخلی پروژه (پوشه پیدا شده توسط اسکریپت)
        cp my-upload-key.jks "${{ env.PROJECT_PATH }}/my-upload-key.jks"
        cp hamed_release_key.jks "${{ env.PROJECT_PATH }}/hamed_release_key.jks"
        
        # ۳. ساخت فایل داخل پوشه app پروژه
        if [ -d "${{ env.PROJECT_PATH }}/app" ]; then
          cp my-upload-key.jks "${{ env.PROJECT_PATH }}/app/my-upload-key.jks"
          cp hamed_release_key.jks "${{ env.PROJECT_PATH }}/app/hamed_release_key.jks"
        fi

    - name: Inject Properties to local.properties
      run: |
        # تزریق رمزها به فایل تنظیمات در هر دو مسیر اصلی و فرعی
        echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> local.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
        echo "keyAlias=${{ secrets.ALIAS }}" >> local.properties
        echo "storeFile=my-upload-key.jks" >> local.properties
        
        cp local.properties "${{ env.PROJECT_PATH }}/local.properties"
        if [ -d "${{ env.PROJECT_PATH }}/app" ]; then
          cp local.properties "${{ env.PROJECT_PATH }}/app/local.properties"
        fi

    - name: Build Release APK
      run: |
        cd "${{ env.PROJECT_PATH }}"
        ./gradlew assembleRelease

    - name: Sign APK (Extra Security)
      run: |
        cd "${{ env.PROJECT_PATH }}"
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" ! -name "*unsigned*" | head -n 1)
        
        $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
          --ks app/my-upload-key.jks \
          --ks-key-alias "${{ secrets.ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          $APK_PATH

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: "**/app/build/outputs/apk/release/app-release-signed.apk"
