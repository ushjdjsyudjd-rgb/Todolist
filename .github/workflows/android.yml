name: Build Android Release APK (Cafe Bazaar)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find Project Root and Fix Gradle Wrapper
      run: |
        PROJECT_DIR=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | xargs dirname)
        echo "Project directory found at: $PROJECT_DIR"
        
        cd "$PROJECT_DIR"
        
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found, initializing gradle wrapper..."
          gradle wrapper
        fi
        
        chmod +x gradlew
        echo "PROJECT_PATH=$PROJECT_DIR" >> $GITHUB_ENV

    - name: Decode Keystore (Prepare for Build)
      run: |
        cd "${{ env.PROJECT_PATH }}"
        # ساخت فایل کلید با هر دو نام احتمالی برای پوشش کامل تنظیمات گریدل شما
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > my-upload-key.jks
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > hamed_release_key.jks
        
        if [ -d "app" ]; then
          cp my-upload-key.jks app/my-upload-key.jks
          cp hamed_release_key.jks app/hamed_release_key.jks
        fi

    - name: Build Release APK
      env:
        # تزریق مستقیم تمام متغیرهای رمز به ساختار گریدل با نام‌های مختلف برای رفع خطای بیلد
        KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ALIAS }}
        MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.ALIAS }}
      run: |
        cd "${{ env.PROJECT_PATH }}"
        ./gradlew assembleRelease

    - name: Sign APK (Extra Security)
      run: |
        cd "${{ env.PROJECT_PATH }}"
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" ! -name "*unsigned*" | head -n 1)
        
        $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
          --ks my-upload-key.jks \
          --ks-key-alias "${{ secrets.ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          $APK_PATH

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: "**/app/build/outputs/apk/release/app-release-signed.apk"
