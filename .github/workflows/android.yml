name: Build Android Release APK (Cafe Bazaar)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find Project Root and Fix Gradle Wrapper
      run: |
        # پیدا کردن پوشه‌ای که فایل build.gradle در آن قرار دارد
        PROJECT_DIR=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | xargs dirname)
        echo "Project directory found at: $PROJECT_DIR"
        cd $PROJECT_DIR
        
        # اگر فایل gradlew وجود نداشت، آن را به صورت خودکار ایجاد کن
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found, initializing gradle wrapper..."
          gradle wrapper
        fi
        
        # دادن مجوز دسترسی اجرایی
        chmod +x gradlew
        
        # ذخیره مسیر پروژه برای مراحل بعدی
        echo "PROJECT_PATH=$PROJECT_DIR" >> $GITHUB_ENV

    - name: Build Release APK
      run: |
        cd ${{ env.PROJECT_PATH }}
        ./gradlew assembleRelease

    - name: Decode and Setup Keystore
      run: |
        cd ${{ env.PROJECT_PATH }}
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release-key.jks

    - name: Sign APK using apksigner
      run: |
        cd ${{ env.PROJECT_PATH }}
        
        # پیدا کردن مسیر ابزارهای رسمی اندروید
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
        
        # پیدا کردن فایل APK بیلد شده
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" ! -name "*unsigned*" | head -n 1)
        
        # امضای نهایی فایل با اطلاعات شما
        $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
          --ks release-key.jks \
          --ks-key-alias "${{ secrets.ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          $APK_PATH

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: "**/app/build/outputs/apk/release/app-release-signed.apk"
