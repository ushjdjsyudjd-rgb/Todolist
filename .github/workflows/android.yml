name: Build Android Release APK (Cafe Bazaar)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Auto-Detect Project Root and Setup Files
      run: |
        PROJECT_DIR=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | xargs dirname)
        echo "Android project directory detected at: $PROJECT_DIR"
        echo "PROJECT_PATH=$PROJECT_DIR" >> $GITHUB_ENV
        
        cd "$PROJECT_DIR"
        
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew
        
        # ساخت فایل کلید با هر دو نام احتمالی در پوشه اصلی پروژه اندروید و پوشه app
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > my-upload-key.jks
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > hamed_release_key.jks
        
        if [ -d "app" ]; then
          cp my-upload-key.jks app/my-upload-key.jks
          cp hamed_release_key.jks app/hamed_release_key.jks
        fi

    - name: Build Release APK with Direct Properties
      run: |
        cd "${{ env.PROJECT_PATH }}"
        
        # تزریق مستقیم و مستقیم پارامترها به بدنه گریدل برای دور زدن محدودیت فایل‌ها
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.config.file="" \
          -PstoreFile=my-upload-key.jks \
          -PstorePassword="${{ secrets.KEY_STORE_PASSWORD }}" \
          -PkeyAlias="${{ secrets.ALIAS }}" \
          -PkeyPassword="${{ secrets.KEY_PASSWORD }}" \
          -Pandroid.signingConfigs.release.storeFile=my-upload-key.jks \
          -Pandroid.signingConfigs.release.storePassword="${{ secrets.KEY_STORE_PASSWORD }}" \
          -Pandroid.signingConfigs.release.keyAlias="${{ secrets.ALIAS }}" \
          -Pandroid.signingConfigs.release.keyPassword="${{ secrets.KEY_PASSWORD }}"

    - name: Sign APK (Extra Security for Cafe Bazaar)
      run: |
        cd "${{ env.PROJECT_PATH }}"
        BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
        
        # پیدا کردن فایل APK بیلد شده
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        echo "Found APK to sign: $APK_PATH"
        
        # امضای دستی نهایی با apksigner رسمی اندروید
        $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
          --ks my-upload-key.jks \
          --ks-key-alias "${{ secrets.ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          $APK_PATH

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: "**/app/build/outputs/apk/release/app-release-signed.apk"
